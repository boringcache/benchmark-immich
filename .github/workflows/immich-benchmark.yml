name: "Immich Benchmark"
run-name: >-
  ${{ format('Benchmark {0} | {1}', github.event_name == 'pull_request' && 'Validation' || github.event_name == 'workflow_dispatch' && inputs.cli_version != '' && 'Canary' || (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling')) && 'Rolling' || 'Fresh', github.event_name == 'push' && 'Upstream update' || github.event_name == 'schedule' && 'Weekly' || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
      prewarm_buildkit_image:
        description: "Optional BuildKit image. When set, the run adds a BC BuildKit backend lane."
        required: false
        type: string
        default: ""
      cli_version:
        description: "Optional BoringCache CLI release tag for canary runs, for example vcli-canary."
        required: false
        type: string
        default: ""
      benchmark_id_suffix:
        description: "Optional suffix appended to built-in benchmark/cache scopes for isolated comparison runs."
        required: false
        type: string
        default: ""
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
  schedule:
    - cron: "0 3 * * 2"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/immich-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"
      - "libjxl-patches/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  packages: read

jobs:
  github-actions-cache:
    name: GHA
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: immich${{ inputs.benchmark_id_suffix }}
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: true

  boringcache-oci:
    name: BC OCI
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC OCI
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: immich${{ inputs.benchmark_id_suffix }}
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          cli_platform: linux-amd64
          cli_version: ${{ inputs.cli_version }}
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: true

  boringcache-buildkit-backend:
    name: BC BuildKit Backend
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC BuildKit Backend
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: immich-bc-buildkit${{ inputs.benchmark_id_suffix }}
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          cli_platform: linux-amd64
          cli_version: ${{ inputs.cli_version }}
          buildkit_image: ${{ inputs.prewarm_buildkit_image || vars.IMMICH_PREWARM_BUILDKIT_IMAGE || 'ghcr.io/boringcache/buildkit:v0.30.0-bc' }}
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: true
          buildkit_cache_backend: boringcache
          oci_hydration: metadata-only

  fresh-github-actions-cache:
    name: GHA
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'fresh') }}
    uses: ./.github/workflows/reusable-docker-buildkit-benchmark.yml
    with:
      strategy: actions-cache
      cache_lane: fresh
      benchmark_id: ${{ format('immich{0}', inputs.benchmark_id_suffix) }}
      project_repo: immich-app/immich
      dockerfile_path: upstream/server/Dockerfile
      docker_context: upstream
      image_tag: immich-server-benchmark:latest
      benchmark_workspace: ${{ github.repository }}
      free_disk_space: true
    secrets: inherit

  fresh-boringcache-oci:
    name: BC OCI
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'fresh') }}
    uses: ./.github/workflows/reusable-docker-buildkit-benchmark.yml
    with:
      strategy: boringcache
      cache_lane: fresh
      buildkit_backend: registry
      benchmark_id: ${{ format('immich{0}', inputs.benchmark_id_suffix) }}
      project_repo: immich-app/immich
      dockerfile_path: upstream/server/Dockerfile
      docker_context: upstream
      image_tag: immich-server-benchmark:latest
      cli_platform: linux-amd64
      cli_version: ${{ inputs.cli_version }}
      benchmark_workspace: ${{ github.repository }}
      free_disk_space: true
    secrets: inherit

  fresh-boringcache-buildkit-backend:
    name: BC BuildKit Backend
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'fresh') }}
    uses: ./.github/workflows/reusable-docker-buildkit-benchmark.yml
    with:
      strategy: boringcache
      cache_lane: fresh
      buildkit_backend: registry
      buildkit_cache_backend: boringcache
      oci_hydration: metadata-only
      benchmark_id: ${{ format('immich-bc-buildkit{0}', inputs.benchmark_id_suffix) }}
      project_repo: immich-app/immich
      dockerfile_path: upstream/server/Dockerfile
      docker_context: upstream
      image_tag: immich-server-benchmark:latest
      cli_platform: linux-amd64
      cli_version: ${{ inputs.cli_version }}
      buildkit_image: ${{ inputs.prewarm_buildkit_image || vars.IMMICH_PREWARM_BUILDKIT_IMAGE || 'ghcr.io/boringcache/buildkit:v0.30.0-bc' }}
      benchmark_workspace: ${{ github.repository }}
      free_disk_space: true
    secrets: inherit
