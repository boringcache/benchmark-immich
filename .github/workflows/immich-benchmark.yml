name: "Immich Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      prewarm_buildkit_image:
        description: "Optional managed BuildKit image override. Defaults to the stable managed channel."
        required: false
        type: string
        default: ""
      cli_version:
        description: "Optional BoringCache CLI release tag for canary runs, for example vcli-canary."
        required: false
        type: string
        default: ""
      benchmark_id_suffix:
        description: "Optional suffix appended to built-in benchmark/cache scopes for isolated comparison runs."
        required: false
        type: string
        default: ""
  schedule:
    - cron: "0 3 * * 2"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/immich-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"
      - "libjxl-patches/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  packages: read

jobs:
  github-actions-cache:
    name: GHA
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: immich${{ inputs.benchmark_id_suffix }}
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: true

  boringcache-oci:
    name: BC OCI
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC OCI
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: immich${{ inputs.benchmark_id_suffix }}
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          cli_platform: linux-amd64
          cli_version: ${{ inputs.cli_version }}
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: true

  boringcache-buildkit-backend:
    name: BC BuildKit Backend
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC BuildKit Backend
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: immich-bc-buildkit${{ inputs.benchmark_id_suffix }}
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          cli_platform: linux-amd64
          cli_version: ${{ inputs.cli_version }}
          buildkit_image: ${{ inputs.prewarm_buildkit_image || vars.IMMICH_PREWARM_BUILDKIT_IMAGE || 'ghcr.io/boringcache/buildkit:v0.30.0-bc' }}
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: true
          buildkit_cache_backend: boringcache
          oci_hydration: metadata-only
