name: "Immich Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      prewarm_buildkit_image:
        description: "Optional experimental BuildKit image. When set, the rolling run adds a BC BuildKit backend lane."
        required: false
        type: string
        default: ""
  schedule:
    - cron: "0 3 * * 2"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/immich-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"
      - "libjxl-patches/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  packages: read

jobs:
  github-actions-cache:
    name: GHA
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: immich
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          benchmark_workspace: ${{ github.repository }}

  ecr-cache:
    name: ECR
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: ECR
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: ecr-cache
          benchmark_id: immich
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          ecr_region: ${{ vars.DOCKER_BENCHMARK_ECR_REGION || 'us-east-1' }}
          ecr_role_arn: ${{ vars.DOCKER_BENCHMARK_ECR_ROLE_ARN }}
          ecr_registry: ${{ vars.DOCKER_BENCHMARK_ECR_REGISTRY }}
          ecr_repository: ${{ vars.DOCKER_BENCHMARK_ECR_REPOSITORY }}

  boringcache-oci:
    name: BC OCI
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC OCI
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: immich
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}

  # No Docker +toolcache lanes here yet: the Immich image uses pnpm/mise cache
  # mounts inside Docker, not a stable supported turbo/nx/sccache secret
  # contract. Keep the Docker graph unchanged until that adapter exists.
  boringcache-native:
    name: BC Native
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC Native
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: native
          benchmark_id: immich-native
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}

  boringcache-buildkit-backend:
    name: BC BuildKit Backend
    if: ${{ github.event_name != 'pull_request' && (inputs.prewarm_buildkit_image || vars.IMMICH_PREWARM_BUILDKIT_IMAGE) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC BuildKit Backend
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: immich-bc-buildkit
          project_repo: immich-app/immich
          dockerfile_path: upstream/server/Dockerfile
          docker_context: upstream
          image_tag: immich-server-benchmark:latest
          cli_platform: linux-amd64
          buildkit_image: ${{ inputs.prewarm_buildkit_image || vars.IMMICH_PREWARM_BUILDKIT_IMAGE }}
          benchmark_workspace: ${{ github.repository }}
          buildkit_cache_backend: boringcache
          oci_hydration: bodies-before-ready
