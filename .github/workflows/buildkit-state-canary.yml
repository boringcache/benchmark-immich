name: BuildKit State Canary
run-name: BuildKit state 4c | Immich server | ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  packages: read

concurrency:
  group: buildkit-state-canary-immich-4c
  cancel-in-progress: false

jobs:
  state:
    name: State 4c / Immich server
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BORINGCACHE_API_URL: https://api.boringcache.com
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
      BORINGCACHE_BUILD_MAX_ATTEMPTS: "1"
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        shell: bash
        run: |
          set -euo pipefail
          available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
          required_kb=$((45 * 1024 * 1024))
          if (( available_kb < required_kb )); then
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
            sudo docker system prune --all --volumes --force
          fi
          df -h /

      - name: Checkout pinned Immich source
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream

      - name: Prepare native benchmark source
        shell: bash
        run: ./scripts/prepare-source.sh base

      - name: Build with persistent BuildKit state
        uses: boringcache/one@one-canary-a2a1e9c7f82d
        env:
          BORINGCACHE_BUILDKIT_MOUNTCACHE_OFFLOADER: "1"
          BORINGCACHE_REQUIRE_SERVER_SIGNATURE: "1"
        with:
          setup: none
          mode: docker
          workspace: ${{ github.repository }}
          cli-version: vcli-canary-1552d25f9179
          cli-platform: linux-amd64
          cache-runtime: "false"
          cache-backend: state
          managed-buildkit-image: ghcr.io/boringcache/buildkit@sha256:cfcc50779c981fa63ef4818e6744adfa642cc5fd00b60539def3458862739510
          cache-tag: immich-server-buildkit-state-graduation-20260717-4c
          working-directory: .
          context: upstream
          dockerfile: server/Dockerfile
          image: immich-server-state-benchmark
          tags: latest
          platforms: linux/amd64
          load: "false"
          push: "false"
          proxy-no-git: "true"
          proxy-no-platform: "true"
          no-platform: "true"
          save-policy: auto
          fail-on-cache-error: "true"
          verify: wait
          verify-require-server-signature: "true"
          diagnostics: summary
          diagnostics-artifact-name: ${{ format('immich-server-state-4c-r{0}-a{1}', github.run_id, github.run_attempt) }}
          diagnostics-artifact-retention-days: "14"
          metadata-hints: benchmark=immich-server-state,phase=commit
